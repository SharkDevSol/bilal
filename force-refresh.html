<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>Force Refresh - Skoolific</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .spinner {
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 1rem;
        }
        
        .progress {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 2rem;
        }
        
        .progress-bar {
            background: white;
            height: 100%;
            width: 0%;
            animation: progress 3s ease-in-out forwards;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Refreshing Application</h1>
        <div class="spinner"></div>
        <p>Clearing cache and loading latest version...</p>
        <div class="progress">
            <div class="progress-bar"></div>
        </div>
        <div class="status" id="status">Initializing...</div>
    </div>
    
    <script>
        const statusEl = document.getElementById('status');
        let step = 0;
        
        const steps = [
            'Clearing browser cache...',
            'Removing old service workers...',
            'Clearing local storage...',
            'Loading fresh content...',
            'Redirecting to Faults page...'
        ];
        
        function updateStatus() {
            if (step < steps.length) {
                statusEl.textContent = steps[step];
                step++;
                setTimeout(updateStatus, 600);
            }
        }
        
        updateStatus();
        
        // Clear all caches
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) {
                    caches.delete(name);
                    console.log('🗑️ Deleted cache:', name);
                }
            });
        }
        
        // Unregister service workers
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log('🗑️ Unregistered service worker');
                }
            });
        }
        
        // Clear storage (but keep auth tokens)
        const authToken = localStorage.getItem('authToken');
        const token = localStorage.getItem('token');
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        const adminUser = localStorage.getItem('adminUser');
        const userType = localStorage.getItem('userType');
        const userPermissions = localStorage.getItem('userPermissions');
        
        // Clear everything
        localStorage.clear();
        sessionStorage.clear();
        
        // Restore auth data
        if (authToken) localStorage.setItem('authToken', authToken);
        if (token) localStorage.setItem('token', token);
        if (isLoggedIn) localStorage.setItem('isLoggedIn', isLoggedIn);
        if (adminUser) localStorage.setItem('adminUser', adminUser);
        if (userType) localStorage.setItem('userType', userType);
        if (userPermissions) localStorage.setItem('userPermissions', userPermissions);
        
        // Redirect after animation completes
        setTimeout(function() {
            // Add timestamp to force fresh load
            window.location.href = '/faults?v=' + Date.now();
        }, 3000);
    </script>
</body>
</html>
